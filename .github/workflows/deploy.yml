name: Deploy to Railway

# Push-to-deploy: every push to main (and a manual "Run workflow" button)
# uploads the repo to Railway and triggers a build, replacing the manual
# `railway up`. Requires one repo secret: RAILWAY_TOKEN (a Railway *project*
# token scoped to the production environment — see SETUP below).
#
# SETUP (one time):
#   1. Railway dashboard -> project "starfall" -> Settings -> Tokens ->
#      create a token for the "production" environment -> copy it.
#   2. GitHub repo -> Settings -> Secrets and variables -> Actions ->
#      New repository secret -> name: RAILWAY_TOKEN, value: <paste token>.
# After that, just `git push` — this workflow deploys for you.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Don't pile up overlapping deploys; let the newest push win.
concurrency:
  group: railway-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::warning::RAILWAY_TOKEN secret is not set — skipping deploy."
            echo "Add it in repo Settings -> Secrets and variables -> Actions (see this file's SETUP comment), then re-run."
            exit 0
          fi
          railway up --service starfall --ci
